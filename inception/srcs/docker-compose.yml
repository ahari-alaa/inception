version: "3.8"

services:
  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception_network
    restart: always

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    env_file:
      - .env
    expose:
      - 9000
    ports:
      - "9000:9000"
    volumes:
      - wordpress_data:/var/www/wordpress
    networks:
      - inception_network
    depends_on:
      - mariadb
    restart: always

  nginx:
    build: requirements/nginx
    container_name: nginx
    expose:
      - 443
    ports:
     - "443:443"
    volumes:
     - wordpress_data:/var/www/wordpress
    depends_on:
     - wordpress
    networks:
     - inception_network
    restart: always

volumes:
  mariadb_data:
  wordpress_data:

networks:
  inception_network:
